name: Repro

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compare-touched-projects:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repro
        shell: bash
        run: |
          pnpm run repro:compare-touched-projects | tee report.json
          {
            echo '## compare-touched-projects'
            echo
            echo '```json'
            cat report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compare-touched-projects-${{ matrix.os }}
          path: report.json